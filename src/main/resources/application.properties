# Spring Application Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=EduLibrary - User Management System

# ============================================================
# DATABASE CONFIGURATION (H2 In-Memory Database)
# ============================================================
# H2 Console: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:testdb
# Username: sa
# Password: (empty)

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 console (chỉ dùng cho development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA/HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=false

# ============================================================
# SECURITY CONFIGURATION
# ============================================================
# Bật debug logging cho Spring Security (để theo dõi quy trình xác thực)
logging.level.org.springframework.security=INFO

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=INFO
logging.level.com.re.bt4=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================
# DOCUMENTATION
# ============================================================
# Hệ Thống Quản Lý Người Dùng Thư Viện
#
# CustomUserDetailsService Implementation:
# - Tải user từ database (H2)
# - Parse roles từ CSV format
# - Tương tác với Spring Security Authentication
#
# BCryptPasswordEncoder:
# - Strength factor: 12 (cân bằng bảo mật & performance)
# - Salted hashing: ngăn Rainbow Table attack
# - Adaptive: tăng độ phức tạp theo thời gian
#
# Test Users (được khởi tạo khi server start):
# 1. username: admin, password: admin123
#    roles: ROLE_ADMIN, ROLE_USER
#
# 2. username: librarian, password: libpwd123
#    roles: ROLE_LIBRARIAN, ROLE_USER
#
# 3. username: john, password: password123
#    roles: ROLE_USER
#
# Endpoints:
# - GET  / : Trang chủ (public)
# - GET  /dashboard : Dashboard (requires authentication)
# - GET  /admin : Admin page (requires ROLE_ADMIN)
# - GET  /librarian : Librarian page (requires ROLE_LIBRARIAN)
# - GET  /profile : User profile (requires authentication)
# - POST /login : Đăng nhập
# - GET  /logout : Đăng xuất
